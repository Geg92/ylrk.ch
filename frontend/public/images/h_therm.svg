<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Storefront Glass Sky Reflection -->
    <linearGradient id="glass-sky-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E7FF" />
      <stop offset="35%" stop-color="#EFF6FF" />
      <stop offset="70%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>

    <!-- Frosted Glass Gradient -->
    <linearGradient id="frosted-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9" stop-opacity="0.94" />
      <stop offset="15%" stop-color="#FCFCFD" stop-opacity="0.97" />
      <stop offset="85%" stop-color="#FCFCFD" stop-opacity="0.97" />
      <stop offset="100%" stop-color="#E2E8F0" stop-opacity="0.94" />
    </linearGradient>

    <!-- Inside storefront dark depth -->
    <radialGradient id="inside-depth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </radialGradient>

    <!-- Drop Shadow on Decal -->
    <filter id="decal-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.25" />
    </filter>

    <!-- Glass gloss highlight -->
    <linearGradient id="gloss-reflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30" />
      <stop offset="15%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="85%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.15" />
    </linearGradient>
  </defs>

  <!-- Background Layer: Interior of the showroom with vehicles outside reflection -->
  <rect width="800" height="800" fill="url(#inside-depth)" />

  <!-- Out of focus winter trees silhouette outside in reflection (from the photo) -->
  <g opacity="0.35" stroke="#475569" stroke-width="4" stroke-linecap="round">
    <path d="M 680 120 L 710 40 M 710 40 L 730 0 M 710 40 L 700 0 L 690 0" />
    <path d="M 650 180 L 680 120 M 680 120 L 670 60 M 680 120 L 655 80" />
    <path d="M 610 240 L 650 180 Z" />

    <path d="M 120 180 L 150 100 L 140 30 M 150 100 L 180 50 M 120 180 L 95 120" stroke-width="3" />
  </g>

  <!-- Very soft silhouette of a reflected parked luxury vehicle in window (from photo) -->
  <g opacity="0.2" fill="#E2E8F0">
    <!-- Sedan / SUV outline -->
    <path d="M 520 440 L 550 360 C 580 320, 680 320, 720 360 L 780 380 L 790 470 L 520 470 Z" />
    <circle cx="580" cy="470" r="30" fill="#0F172A" />
    <circle cx="720" cy="470" r="30" fill="#0F172A" />
  </g>

  <!-- STOREFRONT FRAMEWORK -->
  <!-- Sturdy dark anodized aluminium frames on the window sides -->
  <rect x="0" y="0" width="800" height="800" fill="none" stroke="#334155" stroke-width="24" />
  <rect x="0" y="0" width="800" height="800" fill="none" stroke="#1E293B" stroke-width="12" />

  <!-- Glass panel sky reflection overlay -->
  <rect x="12" y="12" width="776" height="776" fill="url(#glass-sky-grad)" opacity="0.45" />

  <!-- ========================================== -->
  <!-- HORIZONTAL FROSTED SECURITY GLASS FILM -->
  <!-- ========================================== -->
  <!-- Placed in the center, spanning across the pane (from user photo) -->
  <rect x="12" y="160" width="776" height="480" fill="url(#frosted-grad)" filter="drop-shadow(0 8px 16px rgba(0,0,0,0.15))" />

  <!-- Smooth clean design edge border lines for the frosted decal -->
  <line x1="12" y1="160" x2="788" y2="160" stroke="#E2E8F0" stroke-width="2" />
  <line x1="12" y1="640" x2="788" y2="640" stroke="#CBD5E1" stroke-width="2" />

  <!-- ========================================== -->
  <!-- PRINTED BRAND DECAL OVERLAY (BLACK VINYL) -->
  <!-- ========================================== -->
  <g id="h-therm-logo-decal" filter="url(#decal-shadow)" transform="translate(140, 195)">
    <!-- Main Outer rounded rounded rectangular box border -->
    <rect x="-10" y="-10" width="540" height="260" rx="20" fill="none" stroke="#1E293B" stroke-width="6" />

    <!-- Additional Horizontal accent guideline connected to the hexagon box -->
    <line x1="110" y1="120" x2="-10" y2="120" stroke="#1E293B" stroke-width="6" opacity="0.9" />
    <line x1="410" y1="120" x2="530" y2="120" stroke="#1E293B" stroke-width="6" opacity="0.9" />

    <!-- HEXAGON GRAPHIC Monogram FRAME -->
    <!-- Positioned elegantly at the top center -->
    <g transform="translate(200, -50)">
      <!-- Filled crisp hexagon container -->
      <polygon points="60 0, 115 32, 115 96, 60 128, 5 96, 5 32" fill="#FCFCFD" stroke="#1E293B" stroke-width="6" />
      
      <!-- STYLIZED INTERLOCKING "H" and "L" MONOGRAM (Perfect reproduction of user photo logo) -->
      <!-- Vertical main strokes -->
      <line x1="30" y1="28" x2="30" y2="100" stroke="#1E293B" stroke-width="8" stroke-linecap="round" />
      <line x1="90" y1="28" x2="90" y2="100" stroke="#1E293B" stroke-width="8" stroke-linecap="round" />
      <!-- Horizontal H bar -->
      <line x1="30" y1="64" x2="90" y2="64" stroke="#1E293B" stroke-width="8" stroke-linecap="round" />
      <!-- Vertical central dynamic bar connecting overlapping 'L' structure -->
      <line x1="60" y1="22" x2="60" y2="106" stroke="#1E293B" stroke-width="5" stroke-linecap="round" />
      <line x1="60" y1="106" x2="94" y2="106" stroke="#1E293B" stroke-width="5" stroke-linecap="round" />
    </g>

    <!-- BRANDING TITLE TEXT: H-THERM GmbH -->
    <!-- Modern bold tracking dynamic uppercase letters -->
    <text x="260" y="156" 
          fill="#1E293B" 
          font-family="'Inter', -apple-system, sans-serif" 
          font-weight="950" 
          font-size="42" 
          letter-spacing="1" 
          text-anchor="middle">
      H-THERM GmbH
    </text>

    <!-- CONTACT DETAILS DECAL FOOTER -->
    <g transform="translate(45, 185)" opacity="0.95">
      <!-- Background plate behind contact details -->
      <rect x="0" y="0" width="430" height="40" rx="8" fill="#F8FAFC" fill-opacity="0.8" stroke="#1E293B" stroke-width="1.5" />

      <!-- Phone icon & text -->
      <g transform="translate(15, 12)">
        <!-- Phone symbol -->
        <path d="M 3 2 Q 5 0, 7 0 Q 9 2, 11 4 Q 9 6, 8 7 Q 10 11, 13 12 Q 14 11, 16 9 Q 18 11, 20 13 Q 18 15, 16 16 Z" fill="#1E293B" transform="scale(0.85)" />
        <text x="22" y="15" fill="#1E293B" font-family="'Inter', sans-serif" font-weight="bold" font-size="14">+41 76 465 50 50</text>
      </g>

      <!-- Email icon & text -->
      <g transform="translate(235, 12)">
        <!-- Envelope symbol -->
        <rect x="0" y="1" width="18" height="13" rx="2" fill="none" stroke="#1E293B" stroke-width="2" />
        <path d="M 0 2 L 9 9 L 18 2" fill="none" stroke="#1E293B" stroke-width="2" />
        <text x="26" y="15" fill="#1E293B" font-family="'Inter', sans-serif" font-weight="bold" font-size="14">info@h-therm.ch</text>
      </g>
    </g>
  </g>

  <!-- Storefront glass glare reflection line to enhance realism -->
  <rect x="12" y="12" width="776" height="776" fill="url(#gloss-reflection)" pointer-events="none" />
</svg>
